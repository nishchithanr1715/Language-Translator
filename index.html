<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Multi-Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #333333;
            --input-bg: #262626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 32px;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-weight: 600;
            margin-bottom: 24px;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-section {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            color: var(--text-primary);
            font-size: 16px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        /* Language Picker Section */
        .picker-container {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .search-bar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-bar svg {
            color: var(--text-secondary);
        }

        .search-bar input {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        .lang-list {
            height: 250px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 12px;
            gap: 4px;
        }

        .lang-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lang-item:hover {
            background-color: #333;
            color: var(--text-primary);
        }

        .lang-item.selected {
            background-color: var(--accent-color);
            color: white;
        }

        .lang-item.hidden {
            display: none;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .translate-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .translate-btn:hover {
            background-color: var(--accent-hover);
        }

        .selected-count {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Results Section */
        .results-container {
            margin-top: 32px;
            display: none;
        }

        .results-container.active {
            display: block;
        }

        .result-card {
            background-color: var(--input-bg);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }

        .result-header {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .result-text {
            font-size: 15px;
            line-height: 1.5;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        @media (max-width: 600px) {
            .lang-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8l6 6"></path><path d="M4 14l6-6 2-3"></path><path d="M2 5h12"></path><path d="M7 2h1"></path><path d="M22 22l-5-10-5 10"></path><path d="M14 18h6"></path></svg>
            Multi-Language Translator
        </h1>

        <div class="input-section">
            <label>Text to translate</label>
            <textarea id="inputText" placeholder="Enter text here..."></textarea>
        </div>

        <label>Translate to</label>
        <div class="picker-container">
            <div class="search-bar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="langSearch" placeholder="Search languages...">
            </div>
            <div class="lang-list" id="langList">
                <!-- Languages will be populated here -->
                <div style="padding: 20px; color: var(--text-secondary); grid-column: span 3; text-align: center;">Loading languages...</div>
            </div>
        </div>

        <div class="footer">
            <div class="selected-count" id="selectedCount">0 languages selected</div>
            <button class="translate-btn" id="translateBtn">Translate Now</button>
        </div>

        <div class="results-container" id="resultsContainer">
            <!-- Results will be populated here -->
        </div>
    </div>

    <script>
        const langList = document.getElementById('langList');
        const langSearch = document.getElementById('langSearch');
        const selectedCount = document.getElementById('selectedCount');
        const translateBtn = document.getElementById('translateBtn');
        const inputText = document.getElementById('inputText');
        const resultsContainer = document.getElementById('resultsContainer');

        let allLanguages = {};
        let selectedLanguages = {};

        // Fetch languages on load
        async function fetchLanguages() {
            try {
                const response = await fetch('/languages');
                allLanguages = await response.json();
                renderLanguages();
            } catch (error) {
                langList.innerHTML = '<div style="color: #ef4444; grid-column: span 3; text-align: center;">Error loading languages</div>';
            }
        }

        function renderLanguages() {
            langList.innerHTML = '';
            const sortedNames = Object.keys(allLanguages).sort();
            
            sortedNames.forEach(name => {
                const item = document.createElement('div');
                item.className = 'lang-item';
                item.textContent = name;
                item.dataset.code = allLanguages[name];
                
                item.onclick = () => toggleLanguage(name, allLanguages[name], item);
                
                langList.appendChild(item);
            });
        }

        function toggleLanguage(name, code, element) {
            if (selectedLanguages[name]) {
                delete selectedLanguages[name];
                element.classList.remove('selected');
            } else {
                selectedLanguages[name] = code;
                element.classList.add('selected');
            }
            updateCount();
        }

        function updateCount() {
            const count = Object.keys(selectedLanguages).length;
            selectedCount.textContent = `${count} language${count !== 1 ? 's' : ''} selected`;
        }

        // Search functionality
        langSearch.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const items = langList.getElementsByClassName('lang-item');
            
            Array.from(items).forEach(item => {
                const name = item.textContent.toLowerCase();
                if (name.includes(term)) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        };

        // Translate functionality
        translateBtn.onclick = async () => {
            const text = inputText.value.trim();
            const targets = selectedLanguages;

            if (!text) {
                alert('Please enter text to translate');
                return;
            }

            if (Object.keys(targets).length === 0) {
                alert('Please select at least one language');
                return;
            }

            translateBtn.disabled = true;
            translateBtn.textContent = 'Translating...';
            resultsContainer.innerHTML = '';
            resultsContainer.classList.add('active');

            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, targets })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    alert(data.error);
                } else {
                    renderResults(data.translations);
                }
            } catch (error) {
                alert('Translation failed');
            } finally {
                translateBtn.disabled = false;
                translateBtn.textContent = 'Translate Now';
            }
        };

        function renderResults(translations) {
            resultsContainer.innerHTML = '<h2>Translations</h2><br>';
            for (const [lang, text] of Object.entries(translations)) {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="result-header">${lang}</div>
                    <div class="result-text">${text}</div>
                `;
                resultsContainer.appendChild(card);
            }
            resultsContainer.scrollIntoView({ behavior: 'smooth' });
        }

        fetchLanguages();
    </script>
</body>
</html>
